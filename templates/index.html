<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Space Donut app</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="relative">
  <!-- partials will be injected here -->
  <div id="partial-loader-root">
    <div data-partial="/partials/loader.html"></div>
    <div data-partial="/partials/backgrounds.html"></div>
    <div data-partial="/partials/header.html"></div>

    <main id="app-content">
      <div id="pages-root">
        <!-- pages will be injected here -->
        <div data-partial="/partials/pages/main.html"></div>
        <div data-partial="/partials/pages/leaderboard.html"></div>
        <div data-partial="/partials/pages/games.html"></div>
        <div data-partial="/partials/pages/earn.html"></div>
        <div data-partial="/partials/pages/profile.html"></div>
        <div data-partial="/partials/pages/roulette.html"></div>
      </div>
    </main>

    <!-- modals -->
    <div data-partial="/partials/modals.html"></div>

    <!-- navigation -->
    <div data-partial="/partials/nav.html"></div>
  </div>

  <!-- загрузчик partials -->
  <script src="/static/js/partials-loader.js"></script>

  <!-- оставляем остальные скрипты как у тебя -->
  <script src="/static/js/globals.js"></script>
  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/nav.js"></script>
  <script src="/static/js/main.js"></script>
  <script src="/static/js/earn.js"></script>
  <script src="/static/js/roulette.js?v=1.2"></script>
  <script src="/static/js/games.js"></script>
  <script src="/static/js/games-rocket.js"></script>
  <script src="/static/js/games-cases.js"></script>
  <script src="/static/js/tg-shop.js"></script>
  <script src="/static/js/profile-core.js"></script>
  <script src="/static/js/profile-withdraw.js"></script>
  <script src="/static/js/profile-history.js"></script>
  <script src="/static/js/leaderboard.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
