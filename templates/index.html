<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gifts Mini App</title>
    <!-- Tailwind CSS для быстрой и красивой верстки -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #1f2937);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 70px; /* Отступ для нижнего меню */
        }
        .card-bg {
            background-color: var(--tg-theme-secondary-bg-color, #374151);
        }
        .btn-primary {
            background-color: var(--tg-theme-button-color, #3b82f6);
            color: var(--tg-theme-button-text-color, #ffffff);
        }
        /* Скрытие элементов */
        .hidden-tab { display: none; }
    </style>
</head>
<body class="min-h-screen relative">

    <!-- Заголовок приложения -->
    <header class="p-4 text-center font-bold text-xl border-b border-gray-700">
        Telegram Подарки
    </header>

    <!-- 1 СТРАНИЦА: ГЛАВНАЯ (Все подарки) -->
    <div id="page-main" class="p-4">
        <h2 class="text-lg font-semibold mb-4 text-center">Доступные подарки</h2>
        <!-- Сетка 2 колонки -->
        <div id="main-gifts-grid" class="grid grid-cols-2 gap-4">
            <!-- Подарки загрузятся через JS -->
        </div>
    </div>

    <!-- 2 СТРАНИЦА: ТАБЛИЦА ЛИДЕРОВ -->
    <div id="page-leaderboard" class="p-4 hidden-tab">
        <h2 class="text-lg font-semibold mb-4 text-center">Топ пользователей</h2>
        <div id="leaderboard-list" class="flex flex-col gap-3">
            <!-- Лидеры загрузятся через JS -->
        </div>
    </div>

    <!-- 3 СТРАНИЦА: ПРОФИЛЬ -->
    <div id="page-profile" class="p-4 hidden-tab">
        <div class="flex flex-col items-center mb-6">
            <img id="profile-avatar" src="https://via.placeholder.com/80" alt="Avatar" class="w-20 h-20 rounded-full border-2 border-blue-500 mb-2 object-cover">
            <h2 id="profile-name" class="text-xl font-bold">Загрузка...</h2>
            <p id="profile-username" class="text-gray-400 text-sm">@username</p>
        </div>

        <button onclick="openModal()" class="btn-primary w-full py-3 rounded-xl font-semibold mb-6 shadow-lg transition active:scale-95">
            + Добавить подарок
        </button>

        <h3 class="text-lg font-semibold mb-3">Мои подарки</h3>
        <div id="profile-gifts-grid" class="grid grid-cols-3 gap-3">
            <!-- Инвентарь загрузится через JS -->
        </div>
    </div>

    <!-- НИЖНЯЯ ПАНЕЛЬ НАВИГАЦИИ -->
    <nav class="fixed bottom-0 left-0 w-full card-bg border-t border-gray-700 flex justify-around p-3 pb-safe z-40">
        <button onclick="switchTab('main')" id="nav-main" class="flex flex-col items-center text-blue-400 transition">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-xs">Главная</span>
        </button>
        <button onclick="switchTab('leaderboard')" id="nav-leaderboard" class="flex flex-col items-center text-gray-400 transition">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            <span class="text-xs">Топ</span>
        </button>
        <button onclick="switchTab('profile')" id="nav-profile" class="flex flex-col items-center text-gray-400 transition">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="text-xs">Профиль</span>
        </button>
    </nav>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center z-50 p-4">
        <div class="card-bg rounded-2xl p-6 w-full max-w-sm text-center transform transition-all">
            <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">🎁</div>
            <h3 class="text-xl font-bold mb-2">Как получить подарок?</h3>
            <p class="text-sm text-gray-300 mb-6">Отправьте подарок на этот аккаунт <strong class="text-blue-400">@tthgifts</strong>, и после проверки он появится у вас в профиле!</p>
            <button onclick="closeModal()" class="w-full bg-gray-600 text-white py-3 rounded-xl font-semibold transition active:scale-95">Закрыть</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем приложение на весь экран

        // Глобальные переменные для данных
        let currentUser = null;
        let globalGiftsConfig = {};
        let myGifts = {};

        // Получаем данные пользователя из Telegram (или ставим заглушку для браузера)
        const initDataUnsafe = tg.initDataUnsafe || {};
        const tgUser = initDataUnsafe.user || {
            id: 123456789,
            first_name: "Иван (Тест)",
            username: "test_ivan",
            photo_url: "https://via.placeholder.com/80"
        };

        // Логика переключения вкладок
        function switchTab(tabId) {
            document.getElementById('page-main').classList.add('hidden-tab');
            document.getElementById('page-leaderboard').classList.add('hidden-tab');
            document.getElementById('page-profile').classList.add('hidden-tab');
            
            document.getElementById(`page-${tabId}`).classList.remove('hidden-tab');

            // Обновляем цвета кнопок меню
            ['main', 'leaderboard', 'profile'].forEach(id => {
                const el = document.getElementById(`nav-${id}`);
                if(id === tabId) {
                    el.classList.remove('text-gray-400');
                    el.classList.add('text-blue-400');
                } else {
                    el.classList.remove('text-blue-400');
                    el.classList.add('text-gray-400');
                }
            });

            // Подгружаем данные при переходе
            if(tabId === 'leaderboard') loadLeaderboard();
            if(tabId === 'profile') renderProfile();
        }

        // Модальное окно
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        // Инициализация при запуске
        async function initApp() {
            try {
                // Отправляем данные на бекенд
                const res = await fetch('/api/init', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        tg_id: tgUser.id,
                        username: tgUser.username || "",
                        first_name: tgUser.first_name || "",
                        photo_url: tgUser.photo_url || ""
                    })
                });
                const data = await res.json();
                
                globalGiftsConfig = data.config;
                myGifts = data.user_gifts;
                
                renderMainPage();
            } catch (e) {
                console.error("Ошибка загрузки:", e);
                tg.showAlert("Ошибка подключения к серверу");
            }
        }

        // Рендер Главной страницы
        function renderMainPage() {
            const grid = document.getElementById('main-gifts-grid');
            grid.innerHTML = '';

            for (const [giftId, giftData] of Object.entries(globalGiftsConfig)) {
                const haveCount = myGifts[giftId] || 0;
                const reqCount = giftData.required_amount;
                
                const isUnlocked = haveCount >= reqCount;
                const progressText = isUnlocked ? "Разблокировано!" : `${haveCount} / ${reqCount}`;
                const progressColor = isUnlocked ? "text-green-400" : "text-gray-300";

                grid.innerHTML += `
                    <div class="card-bg rounded-2xl p-4 flex flex-col items-center justify-center text-center shadow-sm">
                        <img src="/${giftData.photo}" alt="${giftData.name}" class="w-16 h-16 object-contain mb-3 drop-shadow-lg" onerror="this.src='https://via.placeholder.com/64?text=🎁'">
                        <h4 class="font-bold text-md mb-1">${giftData.name}</h4>
                        <div class="bg-gray-800 rounded-full px-3 py-1 w-full max-w-[100px]">
                            <span class="text-xs font-semibold ${progressColor}">${progressText}</span>
                        </div>
                    </div>
                `;
            }
        }

        // Загрузка и рендер Таблицы Лидеров
        async function loadLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = '<div class="text-center text-gray-400">Загрузка...</div>';
            
            try {
                const res = await fetch('/api/leaderboard');
                const data = await res.json();
                
                list.innerHTML = '';
                data.leaderboard.forEach((u, index) => {
                    let medal = '';
                    if(index === 0) medal = '🥇';
                    else if(index === 1) medal = '🥈';
                    else if(index === 2) medal = '🥉';
                    else medal = `<span class="text-gray-400 font-bold">${index + 1}</span>`;

                    const avatar = u.photo_url || 'https://via.placeholder.com/40';

                    list.innerHTML += `
                        <div class="card-bg rounded-xl p-3 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-8 text-center text-lg">${medal}</div>
                                <img src="${avatar}" class="w-10 h-10 rounded-full object-cover">
                                <div class="font-semibold">${u.first_name}</div>
                            </div>
                            <div class="bg-blue-900/50 text-blue-300 font-bold px-3 py-1 rounded-lg">
                                ${u.total_gifts} 🎁
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                list.innerHTML = '<div class="text-center text-red-400">Ошибка загрузки</div>';
            }
        }

        // Рендер Профиля
        function renderProfile() {
            document.getElementById('profile-name').innerText = tgUser.first_name;
            document.getElementById('profile-username').innerText = tgUser.username ? `@${tgUser.username}` : '';
            if(tgUser.photo_url) {
                document.getElementById('profile-avatar').src = tgUser.photo_url;
            }

            const grid = document.getElementById('profile-gifts-grid');
            grid.innerHTML = '';

            let hasGifts = false;

            for (const [giftId, amount] of Object.entries(myGifts)) {
                if (amount > 0 && globalGiftsConfig[giftId]) {
                    hasGifts = true;
                    const gift = globalGiftsConfig[giftId];
                    grid.innerHTML += `
                        <div class="card-bg rounded-xl p-3 flex flex-col items-center relative">
                            <div class="absolute -top-2 -right-2 bg-blue-500 text-white text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center border-2 border-gray-800">
                                ${amount}
                            </div>
                            <img src="/${gift.photo}" class="w-12 h-12 object-contain mb-2" onerror="this.src='https://via.placeholder.com/48?text=🎁'">
                            <span class="text-xs text-center text-gray-300">${gift.name}</span>
                        </div>
                    `;
                }
            }

            if(!hasGifts) {
                grid.innerHTML = `<div class="col-span-3 text-center text-gray-400 text-sm mt-4">У вас пока нет подарков.</div>`;
            }
        }

        // Запуск
        initApp();
    </script>
</body>
</html>
