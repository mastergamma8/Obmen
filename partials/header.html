<!-- ХЭДЕР -->
<header class="px-4 flex justify-between items-center relative z-[45] sticky top-0 backdrop-blur-md bg-black/10 border-b border-white/5 mb-4 transition-all duration-300">
    <span class="text-xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400 flex items-center gap-1">
        Space Donut <img src="/gifts/spacedount.png" class="w-5 h-5 object-contain" onerror="this.src='https://via.placeholder.com/20?text=🍩'">
    </span>
    
    <div class="flex items-center gap-1.5">
        <!-- Баланс пончиков -->
        <div class="glass flex items-center rounded-full text-xs font-bold text-blue-300 glow-box shadow-[0_0_10px_rgba(59,130,246,0.2)]">
            <div class="px-2.5 py-1.5 flex items-center gap-1">
                <img src="/gifts/dount.png" class="w-3.5 h-3.5 object-contain" onerror="this.src='https://via.placeholder.com/16'">
                <span id="balance-amount">0</span>
            </div>
            <!-- Кнопка "Как получить пончики" -->
            <button onclick="openModal('add-gift-modal')" class="bg-blue-500/20 hover:bg-blue-500/40 text-blue-300 rounded-r-full pl-1.5 pr-2.5 py-1.5 border-l border-white/10 active:scale-95 transition-all flex items-center justify-center">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"/></svg>
            </button>
        </div>
        
        <!-- Баланс звезд -->
        <div class="glass flex items-center rounded-full text-xs font-bold text-yellow-400 shadow-[0_0_10px_rgba(250,204,21,0.2)]">
            <div class="px-2.5 py-1.5 flex items-center gap-1">
                <img src="/gifts/stars.png" class="w-3.5 h-3.5 object-contain" onerror="this.src='https://via.placeholder.com/16?text=⭐'">
                <span id="stars-amount">0</span>
            </div>
            <!-- Кнопка пополнения звезд -->
            <button onclick="openTopupModal()" class="bg-yellow-500/20 hover:bg-yellow-500/40 text-yellow-400 rounded-r-full pl-1.5 pr-2.5 py-1.5 border-l border-white/10 active:scale-95 transition-all flex items-center justify-center">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"/></svg>
            </button>
        </div>
    </div>
</header>
