<!-- ХЭДЕР -->
<header class="px-4 flex justify-between items-center relative z-[45] sticky top-0 mb-4 transition-all duration-300 bg-transparent">
    
    <!-- Логотип (в парящем стеклянном кружке) -->
    <div class="glass flex items-center justify-center rounded-full w-12 h-12 shadow-[0_0_15px_rgba(255,255,255,0.05)] border border-white/10 flex-shrink-0 hover:scale-105 transition-transform">
         <img src="/gifts/sd.png" class="w-8 h-8 object-contain drop-shadow-md" onerror="this.src='https://via.placeholder.com/32?text=🍩'">
    </div>
    
    <div class="flex items-center gap-2">
        <!-- Баланс пончиков -->
        <div class="glass flex items-center rounded-full text-sm font-bold text-blue-300 glow-box shadow-[0_0_15px_rgba(59,130,246,0.15)] border border-white/10">
            <div class="px-3 py-2 flex items-center gap-1.5">
                <img src="/gifts/dount.png" class="w-4 h-4 object-contain drop-shadow-md" onerror="this.src='https://via.placeholder.com/16?text=🍩'">
                <span id="balance-amount">0</span>
            </div>
            <!-- Кнопка "Как получить пончики" -->
            <button onclick="openModal('add-gift-modal')" class="bg-blue-500/20 hover:bg-blue-500/40 text-blue-300 rounded-r-full pl-2 pr-3 py-2 border-l border-white/10 active:scale-95 transition-all flex items-center justify-center">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"/></svg>
            </button>
        </div>
        
        <!-- Баланс звезд -->
        <div class="glass flex items-center rounded-full text-sm font-bold text-yellow-400 shadow-[0_0_15px_rgba(250,204,21,0.15)] border border-white/10">
            <div class="px-3 py-2 flex items-center gap-1.5">
                <img src="/gifts/stars.png" class="w-4 h-4 object-contain drop-shadow-md" onerror="this.src='https://via.placeholder.com/16?text=⭐'">
                <span id="stars-amount">0</span>
            </div>
            <!-- Кнопка пополнения звезд -->
            <button onclick="openTopupModal()" class="bg-yellow-500/20 hover:bg-yellow-500/40 text-yellow-400 rounded-r-full pl-2 pr-3 py-2 border-l border-white/10 active:scale-95 transition-all flex items-center justify-center">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"/></svg>
            </button>
        </div>
    </div>
</header>
