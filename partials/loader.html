<!-- ЭКРАН ЗАГРУЗКИ -->
<div id="app-loader" class="fixed inset-0 z-[100] bg-[#020617] flex flex-col items-center justify-center transition-opacity duration-500">
    <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-40 pointer-events-none"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-blue-600/20 rounded-full mix-blend-screen filter blur-[80px] pointer-events-none z-0"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-purple-600/20 rounded-full mix-blend-screen filter blur-[100px] pointer-events-none z-0 mt-20"></div>
    <div class="relative z-10 mb-8">
        <div class="absolute inset-0 bg-blue-500/30 blur-2xl rounded-full animate-pulse"></div>
        <img src="/gifts/donuts.png" class="w-40 h-40 object-contain relative z-10 animate-custom-bounce drop-shadow-[0_0_25px_rgba(59,130,246,0.6)]" onerror="this.src='https://via.placeholder.com/160?text=🍩'">
    </div>
    <div class="relative z-10 flex items-center justify-center gap-2 mb-10">
        <span class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400 drop-shadow-[0_0_15px_rgba(96,165,250,0.5)]">Space Donut</span>
        <img src="/gifts/spacedount.png" class="w-8 h-8 object-contain drop-shadow-[0_0_10px_rgba(168,85,247,0.5)]" onerror="this.src='https://via.placeholder.com/32?text=🍩'">
    </div>
    <div class="relative z-10 w-48 h-3 bg-black/50 rounded-full border border-white overflow-hidden shadow-[0_0_10px_rgba(255,255,255,0.1)]">
        <div id="loader-progress" class="h-full bg-gradient-to-r from-blue-400 to-purple-400 rounded-full transition-all duration-[800ms] ease-out shadow-[0_0_15px_rgba(168,85,247,0.8)]" style="width:10%"></div>
    </div>
</div>
