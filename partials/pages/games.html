<!-- СТРАНИЦА 3: ИГРЫ (ОБНОВЛЕННАЯ) -->
<div id="page-games" class="px-5 pb-5 hidden-tab fade-in">
    <h2 class="text-2xl font-bold mb-6 text-white text-center" data-i18n="games_title">Игры</h2>
    
    <div id="games-main-view">
        <!-- Баннер Кейсов -->
        <div onclick="openGamesCases()" class="glass rounded-3xl p-4 flex items-center justify-between cursor-pointer mb-4 active:scale-95 transition-transform bg-gradient-to-r from-blue-600/20 to-indigo-500/10 border border-blue-500/30 overflow-hidden relative shadow-[0_0_30px_rgba(59,130,246,0.1)]">
            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-20 pointer-events-none"></div>
            <div class="flex items-center gap-4 relative z-10">
                <img src="/gifts/case.png" class="w-16 h-16 object-contain drop-shadow-[0_0_15px_rgba(59,130,246,0.8)]" onerror="this.src='https://via.placeholder.com/56?text=📦'">
                <div>
                    <h3 class="text-xl font-bold text-white glow-text" data-i18n="cases_title">Кейсы</h3>
                    <p class="text-sm text-blue-200/80" data-i18n="cases_desc">Открывай и выигрывай редкие подарки!</p>
                </div>
            </div>
            <div class="w-10 h-10 rounded-full bg-blue-500/30 flex items-center justify-center border border-blue-400/50 text-white shadow-[0_0_15px_rgba(59,130,246,0.6)] relative z-10 shrink-0">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </div>
        </div>

        <!-- Баннер: Ракета -->
        <div onclick="openRocketGame()" class="glass rounded-3xl p-4 flex items-center justify-between cursor-pointer mb-6 active:scale-95 transition-transform bg-gradient-to-r from-orange-600/20 to-red-500/10 border border-orange-500/30 overflow-hidden relative shadow-[0_0_30px_rgba(249,115,22,0.1)] group">
            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-20 pointer-events-none"></div>
            <!-- Огонь на фоне -->
            <div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-orange-500/20 to-transparent blur-xl pointer-events-none"></div>

            <div class="flex items-center gap-4 relative z-10">
                <img src="/gifts/raketa.png" class="w-16 h-16 object-contain drop-shadow-[0_0_15px_rgba(249,115,22,0.8)] group-hover:-translate-y-1 transition-transform" onerror="this.src='https://via.placeholder.com/56?text=🚀'">
                <div>
                    <h3 class="text-xl font-bold text-white glow-text" data-i18n="rocket_title">Ракета</h3>
                    <p class="text-sm text-orange-200/80" data-i18n="rocket_desc">Успей забрать иксы до краша!</p>
                </div>
            </div>
            <div class="w-10 h-10 rounded-full bg-orange-500/30 flex items-center justify-center border border-orange-400/50 text-white shadow-[0_0_15px_rgba(249,115,22,0.6)] relative z-10 shrink-0">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </div>
        </div>
    </div>

    <!-- Список Кейсов -->
    <div id="games-cases-list-view" class="hidden animate-slide-up pb-10">
        <div class="flex items-center gap-3 mb-6">
            <button onclick="closeGamesCases()" class="w-10 h-10 glass rounded-full flex items-center justify-center active:scale-95 transition-transform border border-white/10 hover:bg-white/10">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <h3 class="text-xl font-bold text-white flex-1" data-i18n="cases_list_title">Доступные кейсы</h3>
            <!-- Красивый тоглер демо для кейсов -->
            <div id="demo-toggle-cases" class="flex items-center gap-2 cursor-pointer select-none bg-black/30 px-3 py-1.5 rounded-full border border-white/10 hover:bg-black/50 transition-colors" onclick="toggleDemoMode('demo-toggle-cases')">
                <span class="demo-label text-xs font-bold text-white/50 tracking-wide uppercase" data-i18n="cases_demo">Демо</span>
                <div class="demo-track relative w-10 h-5 rounded-full bg-[#0f172a] border border-white/10 shadow-inner transition-colors duration-200" style="flex-shrink:0;">
                    <div class="demo-knob absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-gray-200 shadow-sm transition-transform duration-200"></div>
                </div>
            </div>
        </div>
        <div id="free-case-banner" class="mb-4">
            <!-- Бесплатный кейс — рендерится через JS -->
        </div>
        <div id="cases-grid" class="grid grid-cols-2 gap-4">
            <!-- Кейсы рендерятся здесь -->
        </div>
    </div>

    <!-- Интерфейс игры РАКЕТА (CRASH) -->
    <div id="games-rocket-view" class="hidden animate-slide-up pb-10 flex flex-col h-full">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-3">
                <button onclick="closeRocketGame()" class="w-10 h-10 glass rounded-full flex items-center justify-center active:scale-95 transition-transform border border-white/10 hover:bg-white/10" id="btn-close-rocket">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <h3 class="text-xl font-bold text-white" data-i18n="rocket_title">Ракета</h3>
            </div>
        </div>

        <!-- Игровое поле (Небо / Звезды) -->
        <div class="w-full h-64 glass rounded-3xl relative overflow-hidden mb-6 border border-orange-500/30 shadow-[0_0_20px_rgba(0,0,0,0.5)] bg-[#020617]">
            <div id="rocket-stars-bg" class="absolute inset-0 bg-stars-moving opacity-50"></div>
            
            <!-- DEMO ribbon (Убран эмодзи) -->
            <div id="rocket-demo-ribbon" class="absolute top-2 right-2 z-30 px-3 py-1 rounded-full bg-orange-500/30 border border-orange-500/60 text-orange-300 text-[10px] font-black tracking-widest uppercase hidden shadow-[0_0_10px_rgba(249,115,22,0.4)]">DEMO</div>
            
            <!-- Большой множитель по центру -->
            <div class="absolute inset-0 flex items-center justify-center z-10">
                <div id="rocket-multiplier" class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-400 drop-shadow-lg transition-transform scale-100">1.00x</div>
            </div>
            
            <!-- Текст сообщения -->
            <div class="absolute top-4 left-0 w-full text-center z-20">
                <span id="rocket-status-text" class="text-sm font-bold bg-black/50 px-3 py-1 rounded-full text-white/70 tracking-widest uppercase"></span>
            </div>

            <!-- Сама ракета -->
            <div class="absolute bottom-4 left-1/2 -translate-x-1/2 z-20 flex flex-col items-center">
                <img id="rocket-img" src="/gifts/raketa.png" class="w-20 h-20 object-contain rocket-idle" onerror="this.src='https://via.placeholder.com/80?text=🚀'">
            </div>
        </div>

        <!-- Панель управления -->
        <div class="glass rounded-3xl p-5 border border-white/10 relative z-30 flex-1">
            <!-- Авто-вывод -->
            <div class="mt-0 mb-4" id="rocket-auto-cashout-row">
                <label class="text-white/70 text-sm font-bold mb-2 block" data-i18n="auto_cashout_label">Авто-вывод (множитель):</label>
                <div class="flex items-center gap-2">
                    <div class="relative w-full">
                        <input type="number" id="rocket-auto-cashout-input" step="0.1" min="1.1"
                            class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-lg font-bold text-white focus:outline-none focus:border-orange-500/50 transition-colors"
                            placeholder="Нет"
                            oninput="setAutoCashout(this.value)">
                        <span class="absolute right-4 top-3.5 text-white/50 font-bold">x</span>
                    </div>
                    <button class="btn-auto-cashout bg-white/5 border border-white/10 rounded-xl px-3 py-3 text-sm font-bold text-white/80 active:scale-95 transition-all"
                            data-val="1.5" onclick="setAutoCashout(1.5)">1.5x</button>
                    <button class="btn-auto-cashout bg-white/5 border border-white/10 rounded-xl px-3 py-3 text-sm font-bold text-white/80 active:scale-95 transition-all"
                            data-val="2.0" onclick="setAutoCashout(2.0)">2.0x</button>
                    <button class="btn-auto-cashout bg-white/5 border border-white/10 rounded-xl px-3 py-3 text-sm font-bold text-white/80 active:scale-95 transition-all"
                            data-val="5.0" onclick="setAutoCashout(5.0)">5.0x</button>
                </div>
            </div>
            <label class="block text-sm font-bold text-white/70 mb-2" data-i18n="bet_amount">Сумма ставки:</label>
            <div class="flex items-center gap-2 mb-6">
                <div class="relative flex-1">
                    <input type="number" id="rocket-bet-input" value="50" class="w-full bg-black/40 border border-white/10 rounded-xl pl-4 pr-10 py-3 text-lg font-bold text-white focus:outline-none focus:border-orange-500/50 transition-colors" placeholder="50">
                    <!-- Иконка валюты -->
                    <img id="rocket-currency-icon" src="/gifts/dount.png" class="w-5 h-5 absolute right-3 top-3.5 object-contain opacity-80" onerror="this.src='https://via.placeholder.com/20'">
                </div>
                <!-- Кнопки быстрого выбора -->
                <button onclick="setRocketBet('min')" class="bg-white/5 border border-white/10 rounded-xl px-3 py-3 text-sm font-bold text-white/80 active:scale-95 transition-all">MIN</button>
                <button onclick="setRocketBet('x2')" class="bg-white/5 border border-white/10 rounded-xl px-3 py-3 text-sm font-bold text-white/80 active:scale-95 transition-all">x2</button>
                <button onclick="setRocketBet('max')" class="bg-white/5 border border-white/10 rounded-xl px-3 py-3 text-sm font-bold text-white/80 active:scale-95 transition-all">MAX</button>
            </div>

            <!-- КРАСИВЫЙ ПЕРЕКЛЮЧАТЕЛЬ ДЕМО (Над кнопкой действия) -->
            <div id="demo-toggle-rocket" class="flex items-center justify-center gap-3 cursor-pointer select-none glass bg-white/5 py-3 px-5 rounded-xl border border-white/10 mb-4 hover:border-orange-500/50 hover:bg-white/10 transition-all duration-300 w-full shadow-[0_5px_15px_rgba(0,0,0,0.2)]" onclick="toggleDemoMode('demo-toggle-rocket')">
                <span class="demo-label text-sm font-black text-white/60 tracking-widest uppercase drop-shadow-md transition-colors" data-i18n="rocket_demo">Демо режим</span>
                <div class="demo-track relative w-12 h-6 rounded-full bg-[#0f172a] border border-white/10 shadow-inner transition-colors duration-300">
                    <div class="demo-knob absolute top-[2px] left-[2px] w-5 h-5 rounded-full bg-gradient-to-b from-white to-gray-300 shadow-[0_2px_5px_rgba(0,0,0,0.5)] transition-transform duration-300"></div>
                </div>
            </div>

            <!-- Кнопка действия -->
            <button id="btn-rocket-action" onclick="handleRocketAction()" class="w-full py-4 rounded-xl font-black text-xl text-white active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-lg bg-gradient-to-r from-orange-500 to-red-600 shadow-orange-500/40">
                <span id="rocket-action-text" data-i18n="place_bet">Полететь</span>
            </button>
        </div>
    </div>
</div>
