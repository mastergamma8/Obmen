<!-- СТРАНИЦА 3: ИГРЫ (ОБНОВЛЕННАЯ) -->
<div id="page-games" class="px-5 pb-5 hidden-tab fade-in">
    <h2 class="text-2xl font-bold mb-6 text-white text-center" data-i18n="games_title">Игры</h2>
    
    <div id="games-main-view">
        <!-- Баннер Кейсов -->
        <div id="game-banner-cases" onclick="openGamesCases()" class="glass rounded-3xl p-4 flex items-center justify-between cursor-pointer mb-4 active:scale-95 transition-transform bg-gradient-to-r from-purple-600/20 to-pink-500/10 border border-purple-500/30 overflow-hidden relative shadow-[0_0_30px_rgba(168,85,247,0.1)]">
            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-20 pointer-events-none"></div>
            <div class="flex items-center gap-4 relative z-10">
                <img src="/gifts/case.png" class="w-[90px] h-[90px] object-contain drop-shadow-[0_0_15px_rgba(168,85,247,0.8)]" onerror="this.src='https://via.placeholder.com/56?text=📦'">
                <div>
                    <h3 class="text-xl font-bold text-white glow-text" data-i18n="cases_title">Кейсы</h3>
                    <p class="text-sm text-purple-200/80" data-i18n="cases_desc">Открывай и выигрывай редкие подарки!</p>
                </div>
            </div>
        </div>

        <!-- Баннер: TG Подарки -->
        <div id="game-banner-limited" onclick="openTgShop()" class="glass rounded-3xl p-4 flex items-center justify-between cursor-pointer mb-4 active:scale-95 transition-transform bg-gradient-to-r from-orange-600/20 to-red-500/10 border border-orange-500/30 overflow-hidden relative shadow-[0_0_30px_rgba(249,115,22,0.1)] group">
            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-20 pointer-events-none"></div>
            <div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-orange-500/10 to-transparent blur-xl pointer-events-none"></div>
            <div class="flex items-center gap-4 relative z-10">
                <div class="w-[110px] h-[110px] flex items-center justify-center drop-shadow-[0_0_15px_rgba(249,115,22,0.8)]"><img src="/gifts/limitedgifts.png" class="w-full h-full object-contain" alt="Limited Gifts"></div>
                <div>
                    <h3 class="text-xl font-bold text-white glow-text" data-i18n="tg_shop_title">TG Подарки</h3>
                    <p class="text-sm text-orange-200/80" data-i18n="tg_shop_banner_desc">Купи подарок за <span class="font-bold text-yellow-300">55 ⭐</span> и получи в Telegram!</p>
                </div>
            </div>
        </div>

        <!-- Баннер: Ракета -->
        <div id="game-banner-rocket" onclick="openRocketGame()" class="glass rounded-3xl p-4 flex items-center justify-between cursor-pointer mb-6 active:scale-95 transition-transform bg-gradient-to-r from-blue-600/20 to-indigo-500/10 border border-blue-500/30 overflow-hidden relative shadow-[0_0_30px_rgba(59,130,246,0.1)] group">
            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-20 pointer-events-none"></div>
            <!-- Огонь на фоне -->
            <div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-blue-500/20 to-transparent blur-xl pointer-events-none"></div>

            <div class="flex items-center gap-4 relative z-10">
                <img src="/gifts/raketa.png" class="w-[100px] h-[100px] object-contain drop-shadow-[0_0_15px_rgba(59,130,246,0.8)] group-hover:-translate-y-1 transition-transform" onerror="this.src='https://via.placeholder.com/56?text=🚀'">
                <div>
                    <h3 class="text-xl font-bold text-white glow-text" data-i18n="rocket_title">Ракета</h3>
                    <p class="text-sm text-blue-200/80" data-i18n="rocket_desc">Успей забрать иксы до краша!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Список Кейсов -->
    <div id="games-cases-list-view" class="hidden animate-slide-up pb-10">
        <div class="flex items-center gap-3 mb-6">
            <button onclick="closeGamesCases()" class="w-10 h-10 glass rounded-full flex items-center justify-center active:scale-95 transition-transform border border-white/10 hover:bg-white/10">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <h3 class="text-xl font-bold text-white flex-1" data-i18n="cases_list_title">Доступные кейсы</h3>
            <!-- Красивый тоглер демо для кейсов -->
            <div id="demo-toggle-cases" class="flex items-center gap-2 cursor-pointer select-none bg-black/30 px-3 py-1.5 rounded-full border border-white/10 hover:bg-black/50 transition-colors" onclick="toggleDemoMode('demo-toggle-cases')">
                <span class="demo-label text-xs font-bold text-white/50 tracking-wide uppercase" data-i18n="cases_demo">Демо</span>
                <div class="demo-track relative w-10 h-5 rounded-full bg-[#0f172a] border border-white/10 shadow-inner transition-colors duration-200" style="flex-shrink:0;">
                    <div class="demo-knob absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-gray-200 shadow-sm transition-transform duration-200"></div>
                </div>
            </div>
        </div>
        <div id="free-case-banner" class="mb-4">
            <!-- Бесплатный кейс — рендерится через JS -->
        </div>
        <div id="cases-grid" class="grid grid-cols-2 gap-4">
            <!-- Кейсы рендерятся здесь -->
        </div>
    </div>

    <!-- Интерфейс игры РАКЕТА (CRASH) — Общий раунд -->
    <div id="games-rocket-view" class="hidden animate-slide-up pb-10 flex flex-col">

        <!-- Шапка -->
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-3">
                <button onclick="closeRocketGame()" id="btn-close-rocket"
                    class="w-10 h-10 glass rounded-full flex items-center justify-center active:scale-95 transition-transform border border-white/10 hover:bg-white/10">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h3 class="text-xl font-bold text-white">🚀 Ракета</h3>
            </div>
            <!-- Индикатор раунда -->
            <span id="rocket-round-badge" class="text-xs font-bold text-white/40 bg-white/5 px-3 py-1 rounded-full border border-white/10">Раунд #0</span>
        </div>

        <!-- Игровое поле -->
        <div class="w-full h-60 glass rounded-3xl relative overflow-hidden mb-4 border border-orange-500/20 shadow-[0_0_30px_rgba(0,0,0,0.6)] bg-[#020617]">
            <div id="rocket-stars-bg" class="absolute inset-0 bg-stars-moving opacity-50"></div>

            <!-- Статус (сверху) -->
            <div class="absolute top-3 left-0 w-full text-center z-20 px-4">
                <span id="rocket-status-text" class="text-sm font-bold bg-black/50 px-3 py-1 rounded-full text-white/70 tracking-widest uppercase"></span>
            </div>

            <!-- Множитель (центр) -->
            <div class="absolute inset-0 flex items-center justify-center z-10">
                <div id="rocket-multiplier" class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-400 drop-shadow-lg">1.00x</div>
            </div>

            <!-- OVERLAY: обратный отсчёт 3 2 1 -->
            <div id="rocket-countdown-overlay" class="absolute inset-0 z-30 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm hidden">
                <div class="text-white/60 text-sm font-bold tracking-widest uppercase mb-2">Взлёт через</div>
                <div id="rocket-countdown-number" class="text-8xl font-black text-white drop-shadow-[0_0_30px_rgba(255,165,0,0.8)]">3</div>
            </div>

            <!-- Ракета (снизу по центру) -->
            <div class="absolute bottom-3 left-1/2 -translate-x-1/2 z-20">
                <img id="rocket-img" src="/gifts/raketa.png"
                    class="w-20 h-20 object-contain rocket-idle"
                    onerror="this.src='https://via.placeholder.com/80?text=🚀'">
            </div>
        </div>

        <!-- Панель управления ставкой -->
        <div id="rocket-bet-panel" class="glass rounded-3xl p-4 border border-white/10 mb-4 transition-opacity duration-300">
            <!-- Авто-вывод -->
            <div class="mb-3" id="rocket-auto-cashout-row">
                <label class="text-white/60 text-xs font-bold mb-2 block uppercase tracking-wider">Авто-вывод (множитель):</label>
                <div class="flex items-center gap-2">
                    <div class="relative flex-1">
                        <input type="number" id="rocket-auto-cashout-input" step="0.1" min="1.1"
                            class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-2.5 text-base font-bold text-white focus:outline-none focus:border-orange-500/50 transition-colors"
                            placeholder="Нет" oninput="setAutoCashout(this.value)">
                        <span class="absolute right-3 top-2.5 text-white/40 font-bold text-sm">x</span>
                    </div>
                    <button class="btn-auto-cashout bg-white/5 border border-white/10 rounded-xl px-3 py-2.5 text-sm font-bold text-white/80 active:scale-95 transition-all" data-val="1.5" onclick="setAutoCashout(1.5)">1.5x</button>
                    <button class="btn-auto-cashout bg-white/5 border border-white/10 rounded-xl px-3 py-2.5 text-sm font-bold text-white/80 active:scale-95 transition-all" data-val="2.0" onclick="setAutoCashout(2.0)">2x</button>
                    <button class="btn-auto-cashout bg-white/5 border border-white/10 rounded-xl px-3 py-2.5 text-sm font-bold text-white/80 active:scale-95 transition-all" data-val="5.0" onclick="setAutoCashout(5.0)">5x</button>
                </div>
            </div>

            <!-- Сумма ставки -->
            <label class="block text-xs font-bold text-white/60 mb-2 uppercase tracking-wider">Сумма ставки:</label>
            <div class="flex items-center gap-2 mb-4">
                <div class="relative flex-1">
                    <input type="number" id="rocket-bet-input" value="50"
                        class="w-full bg-black/40 border border-white/10 rounded-xl pl-4 pr-10 py-2.5 text-base font-bold text-white focus:outline-none focus:border-orange-500/50 transition-colors"
                        placeholder="50">
                    <img id="rocket-currency-icon" src="/gifts/stars.png"
                        class="w-5 h-5 absolute right-3 top-2.5 object-contain opacity-80">
                </div>
                <button onclick="setRocketBet('min')" class="bg-white/5 border border-white/10 rounded-xl px-3 py-2.5 text-sm font-bold text-white/80 active:scale-95 transition-all">MIN</button>
                <button onclick="setRocketBet('x2')"  class="bg-white/5 border border-white/10 rounded-xl px-3 py-2.5 text-sm font-bold text-white/80 active:scale-95 transition-all">x2</button>
                <button onclick="setRocketBet('max')" class="bg-white/5 border border-white/10 rounded-xl px-3 py-2.5 text-sm font-bold text-white/80 active:scale-95 transition-all">MAX</button>
            </div>

            <!-- Кнопка действия -->
            <button id="btn-rocket-action" onclick="handleRocketAction()"
                class="w-full py-4 rounded-xl font-black text-xl text-white active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-lg bg-gradient-to-r from-orange-500 to-red-600 shadow-orange-500/40">
                <span id="rocket-action-text">Сделать ставку</span>
            </button>
        </div>

        <!-- Список ставок игроков -->
        <div class="glass rounded-3xl border border-white/10 overflow-hidden">
            <div class="flex items-center justify-between px-4 py-3 border-b border-white/5">
                <span class="text-sm font-bold text-white/60 uppercase tracking-wider">Участники раунда</span>
                <span id="rocket-bets-count" class="text-xs text-white/40 bg-white/5 px-2 py-0.5 rounded-full">0</span>
            </div>
            <div id="rocket-bets-list" class="flex flex-col gap-1 p-3 max-h-72 overflow-y-auto">
                <p class="text-center text-white/30 text-sm py-4">Пока нет ставок</p>
            </div>
        </div>
    </div>

    <!-- ===== TG SHOP VIEW ===== -->
    <div id="games-tg-shop-view" class="hidden animate-slide-up pb-10">
        <!-- Шапка -->
        <div class="flex items-center gap-3 mb-5">
            <button onclick="closeTgShop()" class="w-10 h-10 glass rounded-full flex items-center justify-center active:scale-95 transition-transform border border-white/10 hover:bg-white/10">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <div class="flex-1">
                <h3 class="text-xl font-bold text-white" data-i18n="tg_shop_title">TG Подарки</h3>
                <p class="text-xs text-purple-300/70" data-i18n="tg_shop_header_desc">Цена: <span class="font-bold text-yellow-300">55 ⭐</span> за подарок</p>
            </div>

        </div>

        <!-- Сетка подарков -->
        <div id="tg-shop-grid" class="grid grid-cols-3 gap-3">
            <!-- Рендерится через JS -->
        </div>
    </div>
</div>
