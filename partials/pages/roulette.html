<!-- СТРАНИЦА 6: РУЛЕТКА -->
<div id="page-roulette" class="px-5 pb-5 hidden-tab fade-in flex flex-col items-center pt-2 relative" style="touch-action:pan-y;overscroll-behavior-x:none;">
    <div class="absolute top-20 left-1/2 -translate-x-1/2 w-96 h-96 bg-fuchsia-600/10 rounded-full mix-blend-screen filter blur-[100px] z-[-1] pointer-events-none"></div>

    <!-- ШАПКА -->
    <div class="w-full flex items-center mb-8 relative z-10 justify-center">
        <button onclick="switchTab('main')" class="absolute left-0 w-10 h-10 glass rounded-full flex items-center justify-center active:scale-95 transition-transform border border-white/10 z-30 hover:bg-white/10 shadow-[0_0_15px_rgba(0,0,0,0.5)]">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <h2 class="text-center text-xl font-black tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 drop-shadow-[0_0_15px_rgba(168,85,247,0.6)] uppercase px-12" data-i18n="wheel_fortune">Рулетка</h2>
    </div>

    <!-- ЛЕНТА РУЛЕТКИ -->
    <div class="relative w-full mx-auto mb-8 mt-2 z-10 select-none" style="max-width:min(420px,100%);">

        <!-- Фоновое свечение -->
        <div class="absolute pointer-events-none" style="inset:-20px;border-radius:24px;background:radial-gradient(ellipse at 50% 50%,rgba(168,85,247,0.14) 0%,transparent 70%);filter:blur(18px);"></div>

        <!-- Стрелка сверху -->
        <div class="absolute z-30 pointer-events-none" style="top:-13px;left:50%;transform:translateX(-50%);filter:drop-shadow(0 3px 8px rgba(168,85,247,0.9));">
            <svg width="20" height="15" viewBox="0 0 20 15">
                <defs>
                    <linearGradient id="rstrip-ag-t" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0" stop-color="#e879f9"/>
                        <stop offset="1" stop-color="#818cf8"/>
                    </linearGradient>
                </defs>
                <path d="M10 15L0 0H20Z" fill="url(#rstrip-ag-t)"/>
            </svg>
        </div>

        <!-- Контейнер ленты -->
        <div id="roulette-strip-container" class="relative overflow-hidden" style="height:108px;border-radius:18px;border:1px solid rgba(168,85,247,0.25);background:rgba(2,6,23,0.7);box-shadow:0 0 0 1px rgba(255,255,255,0.04) inset,0 8px 32px rgba(0,0,0,0.5);">

            <!-- Фейд слева -->
            <div class="absolute top-0 bottom-0 left-0 z-20 pointer-events-none" style="width:80px;background:linear-gradient(90deg,rgba(2,6,23,0.96) 0%,rgba(2,6,23,0.6) 60%,transparent 100%);"></div>
            <!-- Фейд справа -->
            <div class="absolute top-0 bottom-0 right-0 z-20 pointer-events-none" style="width:80px;background:linear-gradient(270deg,rgba(2,6,23,0.96) 0%,rgba(2,6,23,0.6) 60%,transparent 100%);"></div>

            <!-- Подсветка центрального слота -->
            <div class="absolute top-0 bottom-0 z-10 pointer-events-none" style="left:50%;transform:translateX(-50%);width:82px;border-radius:14px;border:2px solid rgba(168,85,247,0.75);box-shadow:0 0 22px rgba(168,85,247,0.4),inset 0 0 14px rgba(168,85,247,0.12);"></div>

            <!-- Сама лента -->
            <div id="roulette-strip" class="flex items-center h-full" style="position:absolute;top:0;left:0;will-change:transform;transform:translateX(0px);"></div>
        </div>

        <!-- Стрелка снизу -->
        <div class="absolute z-30 pointer-events-none" style="bottom:-13px;left:50%;transform:translateX(-50%) rotate(180deg);filter:drop-shadow(0 -3px 8px rgba(168,85,247,0.9));">
            <svg width="20" height="15" viewBox="0 0 20 15">
                <defs>
                    <linearGradient id="rstrip-ag-b" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0" stop-color="#e879f9"/>
                        <stop offset="1" stop-color="#818cf8"/>
                    </linearGradient>
                </defs>
                <path d="M10 15L0 0H20Z" fill="url(#rstrip-ag-b)"/>
            </svg>
        </div>
    </div>

    <!-- ДЕМО-ПЕРЕКЛЮЧАТЕЛЬ -->
    <div id="demo-toggle-roulette" class="flex items-center justify-center gap-3 cursor-pointer select-none glass bg-white/5 py-3 px-5 rounded-xl border border-white/10 mb-4 hover:border-purple-500/50 hover:bg-white/10 transition-all duration-300 w-full max-w-xs shadow-[0_5px_15px_rgba(0,0,0,0.2)] relative z-10" onclick="toggleDemoMode('demo-toggle-roulette')">
        <span class="demo-label text-sm font-black text-white/60 tracking-widest uppercase drop-shadow-md transition-colors" data-i18n="roulette_demo">Демо режим</span>
        <div class="demo-track relative w-12 h-6 rounded-full bg-[#0f172a] border border-white/10 shadow-inner transition-colors duration-300">
            <div class="demo-knob absolute top-[2px] left-[2px] w-5 h-5 rounded-full bg-gradient-to-b from-white to-gray-300 shadow-[0_2px_5px_rgba(0,0,0,0.5)] transition-transform duration-300"></div>
        </div>
    </div>

    <!-- КНОПКА ПРОКРУТКИ -->
    <button id="btn-spin" onclick="spinRoulette()" class="btn-spin w-full max-w-xs bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600 py-4 rounded-2xl font-extrabold text-xl text-white shadow-[0_10px_30px_rgba(168,85,247,0.5)] active:scale-[0.97] transition-all animate-gradient-btn border border-white/20 relative overflow-hidden z-10">
        <span class="relative z-10 drop-shadow-md tracking-wide" data-i18n="spin_free">Крутить бесплатно</span>
        <div class="absolute inset-0 bg-white/20 opacity-0 active:opacity-100 transition-opacity active-overlay pointer-events-none"></div>
    </button>

    <p id="spin-cost-text" class="text-sm font-medium text-purple-200/80 mt-5 h-6 text-center bg-black/40 px-5 py-1 rounded-full border border-white/5 backdrop-blur-md z-10"></p>
</div>
