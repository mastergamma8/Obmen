<!-- СТРАНИЦА 6: РУЛЕТКА -->
<div id="page-roulette" class="px-5 pb-5 hidden-tab fade-in flex flex-col items-center pt-2 relative" style="touch-action:pan-y;overscroll-behavior-x:none;">
    <div class="absolute top-20 left-1/2 -translate-x-1/2 w-96 h-96 bg-fuchsia-600/10 rounded-full mix-blend-screen filter blur-[100px] z-[-1] pointer-events-none"></div>
    <div class="w-full flex items-center mb-10 relative z-10 justify-center">
        <button onclick="switchTab('main')" class="absolute left-0 w-10 h-10 glass rounded-full flex items-center justify-center active:scale-95 transition-transform border border-white/10 z-30 hover:bg-white/10 shadow-[0_0_15px_rgba(0,0,0,0.5)]">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <h2 class="text-center text-3xl font-black tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 drop-shadow-[0_0_15px_rgba(168,85,247,0.6)] uppercase" data-i18n="wheel_fortune">Колесо Фортуны</h2>
    </div>

    <!-- КОЛЕСО -->
    <div class="relative w-[300px] h-[300px] sm:w-80 sm:h-80 mx-auto mb-10 mt-4 z-10">
        <div class="absolute inset-[-15px] rounded-full bg-gradient-to-tr from-purple-600/40 via-blue-500/30 to-pink-500/40 blur-2xl animate-pulse pointer-events-none"></div>
        <div class="absolute inset-[-8px] rounded-full bg-gradient-to-b from-white/10 to-transparent border border-white/5 shadow-[0_0_50px_rgba(168,85,247,0.2)] pointer-events-none"></div>
        <div class="absolute -top-7 left-1/2 -translate-x-1/2 z-30 drop-shadow-[0_5px_15px_rgba(255,255,255,0.8)]">
            <svg class="w-14 h-14" viewBox="0 0 24 24" fill="none">
                <defs>
                    <linearGradient id="pointerGrad" x1="12" y1="2" x2="12" y2="22" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#ffffff"/><stop offset="1" stop-color="#a855f7"/>
                    </linearGradient>
                    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="2" result="blur"/>
                        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                    </filter>
                </defs>
                <path d="M12 22L4 8C4 8 8 2 12 2C16 2 20 8 20 8L12 22Z" fill="url(#pointerGrad)" stroke="#4c1d95" stroke-width="1.5" filter="url(#glow)"/>
                <circle cx="12" cy="7" r="2" fill="#3b0764"/>
            </svg>
        </div>
        <div id="roulette-wheel-container" class="w-full h-full rounded-full border-[6px] border-[#0f172a] shadow-[0_0_40px_rgba(0,0,0,0.9)_inset] relative overflow-hidden ring-4 ring-purple-500/20" style="transform:rotate(0deg) translateZ(0);will-change:transform;touch-action:none;cursor:grab;"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[72px] h-[72px] bg-[#020617] rounded-full border-[4px] border-[#1e1b4b] z-20 shadow-[0_0_30px_rgba(0,0,0,1)] flex items-center justify-center ring-2 ring-purple-500/40">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-fuchsia-600 to-blue-600 shadow-[0_0_20px_rgba(192,38,211,0.8)] animate-pulse border border-white/20 relative">
                <div class="absolute inset-1 rounded-full bg-white/30 blur-[2px]"></div>
            </div>
        </div>
    </div>

    <!-- КРАСИВЫЙ ПЕРЕКЛЮЧАТЕЛЬ ДЕМО (Над кнопкой прокрутки) -->
    <div id="demo-toggle-roulette" class="flex items-center justify-center gap-3 cursor-pointer select-none glass bg-white/5 py-3 px-5 rounded-xl border border-white/10 mb-4 hover:border-purple-500/50 hover:bg-white/10 transition-all duration-300 w-full max-w-xs shadow-[0_5px_15px_rgba(0,0,0,0.2)] relative z-10" onclick="toggleDemoMode('demo-toggle-roulette')">
        <span class="demo-label text-sm font-black text-white/60 tracking-widest uppercase drop-shadow-md transition-colors" data-i18n="roulette_demo">Демо режим</span>
        <div class="demo-track relative w-12 h-6 rounded-full bg-[#0f172a] border border-white/10 shadow-inner transition-colors duration-300">
            <div class="demo-knob absolute top-[2px] left-[2px] w-5 h-5 rounded-full bg-gradient-to-b from-white to-gray-300 shadow-[0_2px_5px_rgba(0,0,0,0.5)] transition-transform duration-300"></div>
        </div>
    </div>

    <!-- КНОПКА ПРОКРУТА -->
    <button id="btn-spin" onclick="spinRoulette()" class="btn-spin w-full max-w-xs bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600 py-4 rounded-2xl font-extrabold text-xl text-white shadow-[0_10px_30px_rgba(168,85,247,0.5)] active:scale-[0.97] transition-all animate-gradient-btn border border-white/20 relative overflow-hidden z-10">
        <span class="relative z-10 drop-shadow-md tracking-wide" data-i18n="spin_free">Крутить бесплатно</span>
        <div class="absolute inset-0 bg-white/20 opacity-0 active:opacity-100 transition-opacity active-overlay pointer-events-none"></div>
    </button>

    <p id="spin-cost-text" class="text-sm font-medium text-purple-200/80 mt-5 h-6 text-center bg-black/40 px-5 py-1 rounded-full border border-white/5 backdrop-blur-md z-10"></p>
</div>
