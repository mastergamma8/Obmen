<!-- СТРАНИЦА 5: ПРОФИЛЬ -->
<div id="page-profile" class="px-5 pb-5 hidden-tab fade-in">
    <div class="glass rounded-3xl p-6 flex flex-col items-center mb-6 relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-blue-500/10 to-transparent pointer-events-none"></div>
        <!-- Кнопка настроек -->
        <div class="absolute top-4 right-4 z-20">
            <button onclick="openSettingsModal()" class="relative bg-black/40 rounded-full p-2 border border-white/10 backdrop-blur-md shadow-lg text-white/80 hover:text-white active:scale-95 transition-all group" title="Настройки">
                <svg class="w-5 h-5 group-hover:rotate-45 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
            </button>
        </div>

        <div class="relative mb-3 mt-2">
            <div class="absolute inset-0 rounded-full bg-blue-500/30 blur-md"></div>
            <img id="profile-avatar" src="https://via.placeholder.com/100" class="w-24 h-24 rounded-full border-2 border-blue-400/50 object-cover relative z-10">
        </div>
        <h2 id="profile-name"     class="text-2xl font-bold text-white mb-1" data-i18n="loading">Загрузка...</h2>
        <p  id="profile-username" class="text-blue-300/70 text-sm">@username</p>
    </div>
    <button onclick="openModal('add-gift-modal')" class="bg-gradient-to-r from-blue-500 to-purple-600 shadow-[0_0_20px_rgba(96,165,250,0.4)] text-white w-full py-4 rounded-2xl font-bold text-lg mb-3 active:scale-[0.98] transition-transform" data-i18n="add_gift">+ Добавить подарок</button>
    <button onclick="openHistoryModal()" class="glass border border-white/10 text-white w-full py-3.5 rounded-2xl font-bold text-base mb-3 active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
        <svg class="w-5 h-5 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span data-i18n="history_btn">История операций</span>
    </button>
    <button onclick="openPromoModal()" class="bg-gradient-to-r from-emerald-500 to-teal-600 shadow-[0_0_20px_rgba(16,185,129,0.25)] text-white w-full py-3.5 rounded-2xl font-bold text-base mb-8 active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5h14a2 2 0 0 1 2 2v3a2 2 0 0 0 0 4v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3a2 2 0 0 0 0-4V7a2 2 0 0 1 2-2Z"/>
</svg>
        <span data-i18n="promo_title">Промокод</span>
    </button>
    <div class="flex items-center justify-between mb-4">
        <h3 class="text-xl font-bold text-white" data-i18n="my_gifts">Мои подарки</h3>
        <span class="text-xs text-blue-300/50 uppercase tracking-wider font-semibold" data-i18n="for_withdraw">на вывод</span>
    </div>
    <div id="profile-gifts-grid" class="grid grid-cols-3 gap-4"></div>
</div>
