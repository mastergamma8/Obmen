<!-- СТРАНИЦА 5: ПРОФИЛЬ -->
<div id="page-profile" class="px-5 pb-5 hidden-tab fade-in">
    <div class="glass rounded-3xl p-6 flex flex-col items-center mb-6 relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-blue-500/10 to-transparent pointer-events-none"></div>
        <div class="absolute top-4 left-4 z-20">
            <div class="bg-black/40 rounded-full p-1 border border-white/10 flex gap-1 backdrop-blur-md shadow-lg">
                <button onclick="setLang('ru')" id="lang-ru" class="px-3 py-1 rounded-full text-[10px] font-extrabold transition-all bg-blue-500 text-white shadow-[0_0_10px_rgba(59,130,246,0.5)]">RU</button>
                <button onclick="setLang('en')" id="lang-en" class="px-3 py-1 rounded-full text-[10px] font-extrabold transition-all text-white/50 hover:text-white">EN</button>
            </div>
        </div>
        
        <!-- Кнопка поддержки (профиль) - Иконка оператора с микрофоном -->
        <div class="absolute top-4 right-4 z-20">
            <button onclick="openSupportBot()" class="relative bg-black/40 rounded-full p-2 border border-white/10 backdrop-blur-md shadow-lg text-white/80 hover:text-white active:scale-95 transition-all group" title="Поддержка">
                <!-- Пульсирующий индикатор "Бот онлайн" -->
                <span class="absolute -top-0.5 -right-0.5 flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500 border-2 border-gray-900/50"></span>
                </span>
                <!-- Иконка наушников с микрофоном -->
                <svg class="w-5 h-5 group-hover:-rotate-6 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 11h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-5Zm0 0a9 9 0 1 1 18 0m0 0v5a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3Z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 16v2a4 4 0 0 1-4 4h-5"/>
                </svg>
            </button>
        </div>

        <div class="relative mb-3 mt-2">
            <div class="absolute inset-0 rounded-full bg-blue-500/30 blur-md"></div>
            <img id="profile-avatar" src="https://via.placeholder.com/100" class="w-24 h-24 rounded-full border-2 border-blue-400/50 object-cover relative z-10">
        </div>
        <h2 id="profile-name"     class="text-2xl font-bold text-white mb-1" data-i18n="loading">Загрузка...</h2>
        <p  id="profile-username" class="text-blue-300/70 text-sm">@username</p>
    </div>
    <button onclick="openModal('add-gift-modal')" class="bg-gradient-to-r from-blue-500 to-purple-600 shadow-[0_0_20px_rgba(96,165,250,0.4)] text-white w-full py-4 rounded-2xl font-bold text-lg mb-3 active:scale-[0.98] transition-transform" data-i18n="add_gift">+ Добавить подарок</button>
    <button onclick="openHistoryModal()" class="glass border border-white/10 text-white w-full py-3.5 rounded-2xl font-bold text-base mb-8 active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
        <svg class="w-5 h-5 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span data-i18n="history_btn">История операций</span>
    </button>
    <div class="flex items-center justify-between mb-4">
        <h3 class="text-xl font-bold text-white" data-i18n="my_gifts">Мои подарки</h3>
        <span class="text-xs text-blue-300/50 uppercase tracking-wider font-semibold" data-i18n="for_withdraw">на вывод</span>
    </div>
    <div id="profile-gifts-grid" class="grid grid-cols-3 gap-4"></div>
</div>
