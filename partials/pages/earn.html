<!-- СТРАНИЦА 4: ЗАРАБОТОК -->
<div id="page-earn" class="px-5 pb-5 hidden-tab fade-in">
    <h2 class="text-2xl font-bold mb-4 text-white text-center" data-i18n="earn_title">Заработок</h2>
    <div class="flex bg-black/30 rounded-2xl p-1 border border-white/5 mb-6">
        <button onclick="switchEarnSubtab('referrals')" id="subtab-referrals" class="earn-tab-btn active flex-1 py-2 rounded-xl text-sm font-bold" data-i18n="tab_refs">Рефералы</button>
        <button onclick="switchEarnSubtab('tasks')"     id="subtab-tasks"     class="earn-tab-btn flex-1 py-2 rounded-xl text-sm font-bold" data-i18n="tab_tasks">Задания</button>
    </div>
    <div id="earn-referrals">
        <div class="glass rounded-3xl p-6 text-center mb-6">
            <div class="w-24 h-24 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-3 border border-blue-400/30 glow-box">
                <img src="/gifts/donuts.png" class="w-16 h-16 object-contain"/>
            </div>
            <h3 class="text-lg font-bold text-white mb-2" data-i18n="invite_friends">Приглашайте друзей</h3>
            <p class="text-sm text-blue-200/70 mb-4 leading-relaxed" id="ref-desc"></p>
            <div class="flex gap-2 mb-4">
                <div class="flex-1 bg-blue-500/10 border border-blue-400/20 rounded-2xl p-3 flex flex-col items-center gap-1">
                    <img src="/gifts/dount.png" class="w-6 h-6 object-contain"/>
                    <span class="text-xs font-bold text-blue-300" data-i18n="ref_bonus_donuts_label">10% пончиков</span>
                    <span class="text-xs text-blue-200/50" data-i18n="ref_bonus_donuts_sub">с подарка друга</span>
                </div>
                <div class="flex-1 bg-yellow-500/10 border border-yellow-400/20 rounded-2xl p-3 flex flex-col items-center gap-1">
                    <img src="/gifts/stars.png" class="w-6 h-6 object-contain"/>
                    <span class="text-xs font-bold text-yellow-300" data-i18n="ref_bonus_stars_label">10% звёзд</span>
                    <span class="text-xs text-yellow-200/50" data-i18n="ref_bonus_stars_sub">с пополнения друга</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="shareRefLink()" class="flex-1 btn-primary py-3.5 rounded-xl font-bold text-white active:scale-95 transition-transform" data-i18n="btn_invite">Пригласить друзей</button>
                <button onclick="copyRefLink()"  class="w-14 glass flex items-center justify-center rounded-xl active:scale-95 transition-transform border border-white/20">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                </button>
            </div>
        </div>
        <h4 class="text-md font-bold text-white mb-3" data-i18n="your_refs">Ваши приглашенные</h4>
        <div id="referrals-list" class="flex flex-col gap-3"></div>
    </div>
    <div id="earn-tasks" class="hidden-tab">
        <p class="text-sm text-blue-200/60 mb-4 text-center" id="tasks-desc"></p>
        <div id="tasks-list" class="flex flex-col gap-3"></div>
    </div>
</div>
