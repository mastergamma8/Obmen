<!-- СТРАНИЦА 2: ЛИДЕРЫ -->
<div id="page-leaderboard" class="px-5 pb-5 hidden-tab fade-in relative">
    <h2 class="text-2xl font-bold mb-4 text-white text-center" data-i18n="leaderboard">Таблица лидеров</h2>

    <!-- Tabs с улучшенным стеклянным эффектом -->
    <div class="flex gap-2 mb-5 bg-[#0f172a]/60 backdrop-blur-xl rounded-2xl p-1.5 border border-white/10 shadow-[0_8px_32px_rgba(0,0,0,0.3)]">
        <button id="tab-rich" onclick="switchLeaderboardTab('rich')"
            class="leaderboard-tab active-tab flex-1 flex items-center justify-center gap-2 py-2.5 px-2 rounded-xl text-sm font-bold">
            <img src="/gifts/dount.png" class="w-5 h-5 object-contain drop-shadow-md">
            <span data-i18n="tab_rich">Транжиры</span>
        </button>
        <button id="tab-rocket" onclick="switchLeaderboardTab('rocket')"
            class="leaderboard-tab flex-1 flex items-center justify-center gap-2 py-2.5 px-2 rounded-xl text-sm font-bold">
            <img src="/gifts/raketa.png" class="w-5 h-5 object-contain drop-shadow-md">
            <span data-i18n="tab_rocket">Сорвиголовы</span>
        </button>
        <button id="tab-lucky" onclick="switchLeaderboardTab('lucky')"
            class="leaderboard-tab flex-1 flex items-center justify-center gap-2 py-2.5 px-2 rounded-xl text-sm font-bold">
            <img src="/gifts/case.png" class="w-5 h-5 object-contain drop-shadow-md">
            <span data-i18n="tab_lucky">Счастливчики</span>
        </button>
    </div>

    <div id="leaderboard-list" class="flex flex-col gap-3 pb-24"></div>
    <div id="user-sticky-rank" class="fixed left-0 w-full px-5 z-30 hidden transition-all duration-300" style="bottom:calc(105px + var(--tg-safe-area-inset-bottom, 0px));"></div>
</div>
